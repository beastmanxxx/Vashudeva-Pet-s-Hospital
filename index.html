<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vasudeva Pet Hospital - Value · Vision · Veterinary</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  :root {
    --green: #1a4d2e;
    --green-light: #2d6a4f;
    --gold: #c9a84c;
    --gold-light: #e8c96d;
    --cream: #faf7f0;
    --white: #ffffff;
    --text-dark: #1a1a1a;
    --text-mid: #444;
    --text-light: #777;
    --border: #e8e0d0;
    --shadow: 0 8px 40px rgba(26,77,46,0.10);
    --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; overflow-x: hidden; width: 100%; }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--text-dark); overflow-x:hidden; width: 100%; }

  /* SCROLL ANIMATIONS */
  .reveal { opacity:0; transform:translateY(50px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal.visible { opacity:1; transform:translateY(0); }
  .reveal-left { opacity:0; transform:translateX(-60px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal-left.visible { opacity:1; transform:translateX(0); }
  .reveal-right { opacity:0; transform:translateX(60px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal-right.visible { opacity:1; transform:translateX(0); }
  .reveal-scale { opacity:0; transform:scale(0.85); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal-scale.visible { opacity:1; transform:scale(1); }
  .stagger-1 { transition-delay: 0.1s; }
  .stagger-2 { transition-delay: 0.2s; }
  .stagger-3 { transition-delay: 0.3s; }
  .stagger-4 { transition-delay: 0.4s; }
  .stagger-5 { transition-delay: 0.5s; }

  /* NAVBAR */
  .navbar {
    position:fixed; top:0; left:0; right:0; z-index:1000;
    background:rgba(255,255,255,0.97);
    backdrop-filter: blur(12px);
    box-shadow: 0 2px 20px rgba(26,77,46,0.08);
    padding: 0 30px;
    height: 60px;
    display:flex; align-items:center; justify-content:space-between;
    transition: all 0.3s ease;
  }
  .navbar.scrolled { height:55px; box-shadow:0 4px 30px rgba(26,77,46,0.15); }
  .logo { display:flex; align-items:center; gap:10px; text-decoration:none; flex-shrink:0; }
  .logo-icon { width:44px; height:44px; background:var(--green); border-radius:50%; display:flex; align-items:center; justify-content:center; }
  .logo-icon span { color:var(--gold); font-size:22px; }
  .logo-text h2 { font-family:'Playfair Display',serif; font-size:18px; color:var(--green); line-height:1.1; letter-spacing:0.5px; }
  .logo-text p { font-size:9px; color:var(--gold); letter-spacing:2px; font-weight:600; }
  .nav-links { display:flex; align-items:center; gap:4px; flex:1; justify-content:center; }
  .nav-links a {
    text-decoration:none; color:var(--text-mid); font-size:13.5px; font-weight:500;
    padding:8px 14px; border-radius:8px; transition:all 0.2s;
    position:relative;
  }
  .nav-links a::after {
    content:''; position:absolute; bottom:4px; left:14px; right:14px; height:2px;
    background:var(--gold); border-radius:2px; transform:scaleX(0); transition:transform 0.3s;
  }
  .nav-links a:hover { color:var(--green); }
  .nav-links a:hover::after { transform:scaleX(1); }
  .nav-links a.active { color:var(--gold); }
  .nav-links a.active::after { transform:scaleX(1); }
  .nav-cta {
    background:var(--green); color:#fff; border:none; padding:10px 22px;
    border-radius:10px; font-size:13.5px; font-weight:600; cursor:pointer;
    display:flex; align-items:center; gap:8px; transition:all 0.25s;
    text-decoration:none;
  }
  .nav-cta:hover { background:var(--green-light); transform:translateY(-1px); box-shadow:0 6px 20px rgba(26,77,46,0.3); }

  /* NAV CONTACT BUTTONS (Phone + WhatsApp) */
  .nav-contact-btns { display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .nav-contact-btns a { white-space:nowrap; }
  .nav-contact-btns-mobile { display:none; }

  /* PAGE SECTIONS */
  .page-section { display:none; }
  .page-section.active { display:block; }

  /* HERO SECTION */
  .hero {
    min-height:100vh; padding-top:60px;
    background: linear-gradient(135deg, #f0f7f2 0%, #faf7f0 50%, #f5f0e8 100%);
    display:flex; align-items:center; position:relative; overflow:hidden;
  }
  .hero::before {
    content:''; position:absolute; top:-100px; right:-100px;
    width:600px; height:600px; border-radius:50%;
    background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
    animation: floatBubble 8s ease-in-out infinite;
  }
  .hero::after {
    content:''; position:absolute; bottom:-150px; left:-100px;
    width:500px; height:500px; border-radius:50%;
    background: radial-gradient(circle, rgba(26,77,46,0.08) 0%, transparent 70%);
    animation: floatBubble 10s ease-in-out infinite reverse;
  }
  @keyframes floatBubble { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(30px,-30px) scale(1.05);} }

  .hero-container { max-width:1200px; margin:0 auto; padding:60px 40px; display:grid; grid-template-columns:1fr 1fr; gap:60px; align-items:center; position:relative; z-index:2; }
  .hero-badge { display:inline-flex; align-items:center; gap:8px; background:rgba(201,168,76,0.15); border:1px solid rgba(201,168,76,0.3); border-radius:50px; padding:8px 18px; font-size:12px; font-weight:600; color:var(--gold); letter-spacing:1px; margin-bottom:24px; }
  .hero h1 { font-family:'Playfair Display',serif; font-size:52px; line-height:1.15; color:var(--green); margin-bottom:8px; }
  .hero h1 span { color:var(--gold); display:block; }
  .hero-tagline { font-size:13px; font-weight:700; letter-spacing:3px; color:var(--text-mid); margin-bottom:20px; }
  .hero-desc { font-size:16px; color:var(--text-mid); line-height:1.8; margin-bottom:32px; max-width:480px; }
  .hero-features { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:36px; }
  .hero-feat { display:flex; align-items:center; gap:8px; background:white; border-radius:10px; padding:10px 16px; font-size:13px; font-weight:500; color:var(--text-dark); box-shadow:0 2px 12px rgba(0,0,0,0.06); }
  .hero-feat i { color:var(--gold); font-size:14px; }
  .hero-btns { display:flex; gap:14px; flex-wrap:wrap; }
  .btn-primary { background:var(--green); color:#fff; border:none; padding:14px 28px; border-radius:12px; font-size:14px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:10px; transition:all 0.3s; text-decoration:none; }
  .btn-primary:hover { background:var(--green-light); transform:translateY(-2px); box-shadow:0 10px 30px rgba(26,77,46,0.3); }
  .btn-outline { background:transparent; color:var(--green); border:2px solid var(--green); padding:12px 26px; border-radius:12px; font-size:14px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:10px; transition:all 0.3s; text-decoration:none; }
  .btn-outline:hover { background:var(--green); color:#fff; }
  .hero-image { position:relative; }
  .hero-image-main { width:100%; border-radius:24px; overflow:hidden; box-shadow:0 20px 60px rgba(26,77,46,0.2); }
  .hero-image-main img { width:100%; height:480px; object-fit:cover; }
  .hero-badge-float {
    position:absolute; bottom:-20px; left:-20px;
    background:white; border-radius:16px; padding:16px 20px;
    box-shadow:var(--shadow); display:flex; align-items:center; gap:12px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
  .hero-badge-float .num { font-family:'Playfair Display',serif; font-size:28px; font-weight:700; color:var(--green); }
  .hero-badge-float .lbl { font-size:12px; color:var(--text-light); line-height:1.3; }

  /* STATS BAR */
  .stats-bar { background:var(--green); padding:28px 40px; }
  .stats-inner { max-width:1200px; margin:0 auto; display:grid; grid-template-columns:repeat(4,1fr); gap:20px; }
  .stat-item { text-align:center; padding:10px; border-right:1px solid rgba(255,255,255,0.15); }
  .stat-item:last-child { border-right:none; }
  .stat-item .num { font-family:'Playfair Display',serif; font-size:32px; font-weight:700; color:var(--gold); display:block; }
  .stat-item .lbl { font-size:12px; color:rgba(255,255,255,0.7); letter-spacing:1px; margin-top:2px; }

  /* SECTION HEADERS */
  .section-header { text-align:center; margin-bottom:54px; }
  .section-eyebrow { font-size:12px; font-weight:700; letter-spacing:3px; color:var(--gold); display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:12px; }
  .section-eyebrow i { color:var(--gold); }
  .section-title { font-family:'Playfair Display',serif; font-size:40px; color:var(--green); line-height:1.2; }
  .section-divider { width:50px; height:3px; background:linear-gradient(90deg,var(--gold),var(--gold-light)); border-radius:2px; margin:16px auto 0; }

  /* SERVICES */
  .services-section { padding:90px 40px; max-width:1200px; margin:0 auto; }
  .services-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:28px; }
  .service-card {
    background:white; border-radius:20px; overflow:hidden;
    box-shadow:0 4px 24px rgba(26,77,46,0.07);
    transition:all 0.35s ease;
    cursor:pointer;
  }
  .service-card:hover { transform:translateY(-10px); box-shadow:0 16px 50px rgba(26,77,46,0.15); }
  .service-card-img { width:100%; height:220px; object-fit:cover; }
  .service-card-body { padding:24px; }
  .service-icon { width:48px; height:48px; background:var(--green); border-radius:12px; display:flex; align-items:center; justify-content:center; margin-bottom:14px; }
  .service-icon i { color:var(--gold); font-size:22px; }
  .service-card h3 { font-family:'Playfair Display',serif; font-size:22px; color:var(--green); margin-bottom:10px; }
  .service-card p { font-size:14px; color:var(--text-mid); line-height:1.7; margin-bottom:18px; }
  .service-features { list-style:none; display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:20px; }
  .service-features li { font-size:13px; color:var(--text-mid); display:flex; align-items:center; gap:6px; }
  .service-features li i { color:var(--gold); font-size:11px; }
  .link-more { color:var(--green); font-size:13px; font-weight:600; text-decoration:none; display:flex; align-items:center; gap:6px; transition:gap 0.2s; }
  .link-more:hover { gap:12px; color:var(--gold); }

  /* WHY CHOOSE US */
  .why-section {
    background:var(--green);
    padding:70px 40px;
    position:relative; overflow:hidden;
  }
  .why-section::before {
    content:''; position:absolute; top:0; right:0; bottom:0; width:40%;
    background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400"><circle cx="300" cy="200" r="250" fill="rgba(255,255,255,0.03)"/><circle cx="350" cy="50" r="150" fill="rgba(255,255,255,0.03)"/></svg>');
  }
  .why-inner { max-width:1200px; margin:0 auto; display:grid; grid-template-columns:1fr 2fr; gap:60px; align-items:center; position:relative; z-index:2; }
  .why-left h2 { font-family:'Playfair Display',serif; font-size:38px; color:white; line-height:1.25; margin-bottom:16px; }
  .why-left p { color:rgba(255,255,255,0.7); font-size:15px; line-height:1.8; }
  .why-badge { display:inline-block; background:rgba(201,168,76,0.2); border:1px solid rgba(201,168,76,0.4); border-radius:50px; padding:6px 16px; font-size:11px; color:var(--gold); letter-spacing:2px; margin-bottom:20px; }
  .why-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:24px; }
  .why-item { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:24px 20px; text-align:center; transition:all 0.3s; }
  .why-item:hover { background:rgba(255,255,255,0.1); transform:translateY(-4px); }
  .why-item i { font-size:32px; color:var(--gold); margin-bottom:12px; display:block; }
  .why-item h4 { color:white; font-size:15px; font-weight:600; margin-bottom:6px; }
  .why-item p { color:rgba(255,255,255,0.6); font-size:13px; line-height:1.5; }

  /* APPOINTMENT SECTION */
  .appt-section { padding:90px 40px; }
  .appt-inner { max-width:1200px; margin:0 auto; display:grid; grid-template-columns:1fr 1fr; gap:60px; align-items:center; }
  .appt-image { position:relative; }
  .appt-image img { width:100%; border-radius:20px; }
  .appt-badge {
    position:absolute; top:30px; left:-20px;
    background:var(--green); color:white; border-radius:14px; padding:16px 20px;
    font-size:13px; font-weight:600; line-height:1.4;
    animation: float 4s ease-in-out infinite;
  }
  .appt-badge i { color:var(--gold); margin-right:8px; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .form-group { display:flex; flex-direction:column; gap:6px; }
  .form-group.full { grid-column:1/-1; }
  .form-group label { font-size:12px; font-weight:600; color:var(--text-mid); letter-spacing:0.5px; }
  .form-group input, .form-group select, .form-group textarea {
    border:1.5px solid var(--border); border-radius:10px; padding:12px 16px;
    font-size:14px; font-family:'DM Sans',sans-serif; color:var(--text-dark);
    background:white; transition:border-color 0.2s;
    outline:none;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--green); }
  .form-group textarea { resize:vertical; min-height:90px; }

  /* GALLERY */
  .gallery-section { padding:90px 40px; background:white; }
  .gallery-inner { max-width:1200px; margin:0 auto; }
  .gallery-tabs { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:36px; }
  .tab-btn {
    padding:9px 18px; border-radius:50px; border:1.5px solid var(--border);
    background:white; font-size:13px; font-weight:500; cursor:pointer;
    display:flex; align-items:center; gap:7px; color:var(--text-mid);
    transition:all 0.2s;
  }
  .tab-btn.active, .tab-btn:hover { background:var(--green); color:white; border-color:var(--green); }
  .gallery-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
  .gallery-item { border-radius:14px; overflow:hidden; cursor:pointer; position:relative; }
  .gallery-item:nth-child(3) { grid-column:span 2; grid-row:span 2; }
  .gallery-item img { width:100%; height:100%; object-fit:cover; transition:transform 0.4s; min-height:160px; display:block; }
  .gallery-item:hover img { transform:scale(1.06); }
  .gallery-overlay {
    position:absolute; inset:0;
    background:linear-gradient(to top, rgba(26,77,46,0.7), transparent);
    opacity:0; transition:opacity 0.3s;
    display:flex; align-items:flex-end; padding:16px;
  }
  .gallery-item:hover .gallery-overlay { opacity:1; }
  .gallery-overlay span { color:white; font-size:13px; font-weight:500; }

  /* TEAM */
  .team-section { padding:90px 40px; }
  .team-inner { max-width:1200px; margin:0 auto; }
  .team-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:24px; }
  .team-card { background:white; border-radius:20px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.06); transition:all 0.3s; }
  .team-card:hover { transform:translateY(-8px); box-shadow:0 16px 40px rgba(26,77,46,0.12); }
  .team-card img { width:100%; height:220px; object-fit:cover; object-position:top; }
  .team-card-body { padding:20px; }
  .team-role { font-size:11px; font-weight:700; color:var(--gold); letter-spacing:1px; margin-bottom:4px; }
  .team-card h4 { font-family:'Playfair Display',serif; font-size:17px; color:var(--green); margin-bottom:6px; }
  .team-exp { font-size:12px; color:var(--text-light); margin-bottom:10px; }
  .team-card p { font-size:13px; color:var(--text-mid); line-height:1.6; margin-bottom:14px; }
  .team-socials { display:flex; gap:8px; }
  .team-socials a { width:30px; height:30px; border-radius:8px; background:var(--cream); display:flex; align-items:center; justify-content:center; color:var(--green); font-size:13px; transition:all 0.2s; text-decoration:none; }
  .team-socials a:hover { background:var(--green); color:white; }

  /* TESTIMONIALS */
  .testimonials-section { padding:90px 40px; background:var(--cream); }
  .testi-inner { max-width:1200px; margin:0 auto; }
  .testi-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:24px; }
  .testi-card { background:white; border-radius:20px; padding:28px; box-shadow:0 4px 20px rgba(0,0,0,0.05); transition:transform 0.3s; }
  .testi-card:hover { transform:translateY(-6px); }
  .testi-stars { color:var(--gold); font-size:14px; margin-bottom:14px; }
  .testi-card p { font-size:15px; color:var(--text-mid); line-height:1.8; font-style:italic; margin-bottom:20px; }
  .testi-author { display:flex; align-items:center; gap:12px; }
  .testi-avatar { width:44px; height:44px; border-radius:50%; background:var(--green); display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:16px; }
  .testi-name { font-weight:600; font-size:14px; color:var(--text-dark); }
  .testi-label { font-size:12px; color:var(--text-light); }

  /* PET STORE */
  .store-section { padding:90px 40px; background:white; }
  .store-inner { max-width:1200px; margin:0 auto; }
  .categories-row { display:flex; gap:14px; overflow-x:auto; padding-bottom:10px; margin-bottom:42px; }
  .cat-item { min-width:100px; background:var(--cream); border-radius:14px; padding:16px 12px; text-align:center; cursor:pointer; transition:all 0.2s; border:2px solid transparent; flex-shrink:0; }
  .cat-item.active, .cat-item:hover { background:var(--green); color:white; border-color:var(--green); }
  .cat-item i { font-size:26px; color:var(--gold); display:block; margin-bottom:8px; }
  .cat-item.active i, .cat-item:hover i { color:white; }
  .cat-item span { font-size:12px; font-weight:600; color:var(--text-mid); display:block; }
  .cat-item.active span, .cat-item:hover span { color:white; }
  .products-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:20px; }
  .product-card { background:white; border:1.5px solid var(--border); border-radius:16px; padding:16px; transition:all 0.3s; position:relative; }
  .product-card:hover { border-color:var(--green); box-shadow:0 8px 30px rgba(26,77,46,0.1); transform:translateY(-4px); }
  .product-badge { position:absolute; top:12px; left:12px; background:var(--green); color:white; font-size:10px; font-weight:700; padding:4px 8px; border-radius:6px; }
  .product-img { width:100%; height:130px; object-fit:contain; margin-bottom:12px; }
  .product-brand { font-size:11px; color:var(--text-light); margin-bottom:4px; }
  .product-name { font-size:13px; font-weight:600; color:var(--text-dark); margin-bottom:8px; line-height:1.4; }
  .product-stars { color:var(--gold); font-size:12px; margin-bottom:8px; }
  .product-price { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
  .product-price .current { font-weight:700; font-size:16px; color:var(--green); }
  .product-price .original { font-size:12px; color:var(--text-light); text-decoration:line-through; }
  .add-cart { width:100%; background:var(--green); color:white; border:none; padding:9px; border-radius:9px; font-size:12px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px; transition:all 0.2s; }
  .add-cart:hover { background:var(--green-light); }
  .brands-row { display:flex; gap:30px; align-items:center; justify-content:center; flex-wrap:wrap; margin-top:50px; padding:30px; background:var(--cream); border-radius:16px; }
  .brand-name { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; color:var(--text-mid); opacity:0.6; transition:opacity 0.2s; cursor:pointer; }
  .brand-name:hover { opacity:1; color:var(--green); }

  /* ABOUT */
  .about-section { padding:90px 40px; }
  .about-inner { max-width:1200px; margin:0 auto; }
  .about-story { display:grid; grid-template-columns:1fr 1fr; gap:60px; align-items:center; margin-bottom:70px; }
  .about-img { position:relative; border-radius:20px; overflow:hidden; }
  .about-img img { width:100%; border-radius:20px; }
  .about-years {
    position:absolute; bottom:-15px; right:-15px;
    background:var(--green); color:white; border-radius:14px; padding:20px 24px; text-align:center;
  }
  .about-years strong { font-family:'Playfair Display',serif; font-size:36px; color:var(--gold); display:block; }
  .about-years span { font-size:12px; opacity:0.8; }
  .about-content h2 { font-family:'Playfair Display',serif; font-size:38px; color:var(--green); line-height:1.3; margin-bottom:20px; }
  .about-content p { font-size:15px; color:var(--text-mid); line-height:1.8; margin-bottom:16px; }

const { useState, useEffect, useRef } = React;

// ---- SCROLL ANIMATION HOOK ----
function useScrollReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) e.target.classList.add('visible');
      });
    }, { threshold: 0.1 });
    els.forEach(el => observer.observe(el));
    return () => observer.disconnect();
  });
}

// ---- COUNTER COMPONENT ----
function Counter({ target, suffix = '' }) {
  const [val, setVal] = useState(0);
  const ref = useRef();
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {
        let start = 0;
        const dur = 1800;
        const step = target / (dur / 16);
        const t = setInterval(() => {
          start = Math.min(start + step, target);
          setVal(Math.floor(start));
          if (start >= target) clearInterval(t);
        }, 16);
      }
    }, { threshold: 0.5 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [target]);
  return <span ref={ref}>{val}{suffix}</span>;
}

            <a href="#"><i className="fab fa-whatsapp"></i></a>
            <a href="#"><i className="fab fa-youtube"></i></a>
          </div>
        </div>
        <div>
          <h4>Quick Links</h4>
          <ul>
            {[['Home','home'],['About Us','about'],['Services','services'],['Our Team','team'],['Gallery','gallery'],['Pet Store','store'],['Contact','contact']].map(([l,pg]) => (
              <li key={l}><a onClick={() => navigate(pg)} style={{cursor:'pointer'}}>{l}</a></li>
            ))}
          </ul>
        </div>
        <div>
          <h4>Contact Info</h4>
          {[['fa-map-marker-alt','123, Pet Care Street, Your City, State – 000001'],['fa-phone','+91 98948 98976'],['fa-envelope','info@vasudevapethospital.com'],['fa-clock','Mon - Sat: 10:00 AM - 8:00 PM\nSunday: 10:00 AM - 2:00 PM']].map(([ic,c]) => (
            <div className="footer-contact-item" key={c}>
              <i className={`fa ${ic}`}></i>
              <span style={{whiteSpace:'pre-line'}}>{c}</span>
            </div>
          ))}
        </div>
        <div>
          <h4>Our Location</h4>
          <div style={{background:'rgba(255,255,255,0.1)',borderRadius:'12px',padding:'20px',textAlign:'center',border:'1px solid rgba(255,255,255,0.15)'}}>
            <i className="fa fa-map-marker-alt" style={{fontSize:'28px',color:'var(--gold)',marginBottom:'8px',display:'block'}}></i>
            <p style={{fontSize:'12px',color:'rgba(255,255,255,0.7)',lineHeight:'1.5'}}>123, Pet Care Street<br/>Your City, State – 000001</p>

      <div className="footer-bottom">

        <span>Designed with <i className="fa fa-heart"></i> for pets</span>
      </div>
    </footer>
  );
}

// ---- APP ROOT ----
function App() {
  const [activePage, setActivePage] = useState('home');
  const [selectedService, setSelectedService] = useState(null);

  const navigateToAppointment = () => {
    setActivePage('home');
    setTimeout(() => {
      const el = document.getElementById('appointment-section');
      if(el) el.scrollIntoView({behavior:'smooth'});
    }, 100);
  };

  useEffect(() => { window.scrollTo({top:0,behavior:'smooth'}); }, [activePage]);
  const pages = { home: HomePage, about: AboutPage, services: ServicesPage, team: TeamPage, gallery: GalleryPage, store: StorePage, contact: ContactPage };
  const PageComponent = pages[activePage] || HomePage;
  return (
    <>
      <Navbar activePage={activePage} setActivePage={setActivePage} navigateToAppointment={navigateToAppointment}/>
      <PageComponent setActivePage={setActivePage} navigateToAppointment={navigateToAppointment} setSelectedService={setSelectedService} />

      {selectedService && (
        <div style={{
          position:'fixed', inset:0, background:'rgba(0,0,0,0.7)', zIndex:9999,
          display:'flex', alignItems:'center', justifyContent:'center', backdropFilter:'blur(5px)',
          animation:'fadeIn 0.3s ease', padding:'20px'
        }} onClick={() => setSelectedService(null)}>
          <div className="service-modal" style={{
            background:'white', borderRadius:'20px', padding:'40px', width:'100%', maxWidth:'600px',
            position:'relative', animation:'scaleUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)'
          }} onClick={e => e.stopPropagation()}>
            <button style={{
              position:'absolute', top:'15px', right:'15px', background:'var(--cream)', border:'none',
              width:'36px', height:'36px', borderRadius:'50%', fontSize:'18px', color:'var(--text-dark)',
              cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', zIndex:10
            }} onClick={() => setSelectedService(null)}>
              <i className="fa fa-times"></i>
            </button>
            <div style={{textAlign:'center', marginBottom:'20px'}}>
              <div style={{width:'60px', height:'60px', background:'var(--green)', borderRadius:'14px', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 16px'}}>
                <i className={`fa ${selectedService.icon}`} style={{color:'var(--gold)', fontSize:'28px'}}></i>
              </div>
              <h2 style={{fontFamily:"'Playfair Display',serif", fontSize:'32px', color:'var(--green)'}}>{selectedService.title}</h2>
            </div>
            <img src={selectedService.img} alt={selectedService.title} style={{width:'100%', height:'200px', objectFit:'cover', borderRadius:'14px', marginBottom:'20px'}}/>
            <p style={{color:'var(--text-mid)', fontSize:'15px', lineHeight:'1.8', marginBottom:'20px'}}>{selectedService.desc}</p>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', marginBottom:'30px'}}>
              {selectedService.feats && selectedService.feats.map(f => (
                <div key={f} style={{display:'flex', alignItems:'center', gap:'8px'}}>
                  <i className="fa fa-check-circle" style={{color:'var(--gold)', fontSize:'14px'}}></i>
                  <span style={{fontSize:'14px', color:'var(--text-mid)'}}>{f}</span>
                </div>
              ))}
            </div>
            <button className="btn-primary" style={{width:'100%', justifyContent:'center'}} onClick={() => {setSelectedService(null); navigateToAppointment();}}>
              <i className="fa fa-calendar"></i> Book An Appointment
            </button>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
