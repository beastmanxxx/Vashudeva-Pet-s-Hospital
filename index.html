<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restricted</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
height:100vh;display:flex;justify-content:center;align-items:center;
background:#0a0a0a;overflow:hidden;font-family:Arial,sans-serif;
}
.container{width:100%;overflow:hidden;}
.running-text{
white-space:nowrap;font-size:3rem;font-weight:bold;color:#ff3b3b;
text-shadow:0 0 10px #ff3b3b,0 0 20px #ff3b3b,0 0 40px #ff3b3b;
animation:run 12s linear infinite;
}
@keyframes run{
from{transform:translateX(100%);}
to{transform:translateX(-100%);}
}
.bg-glow{
position:absolute;width:400px;height:400px;background:#ff0000;
border-radius:50%;filter:blur(180px);opacity:.15;
animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.3);}
}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="container">
<div class="running-text">
🚫 HOSTING RESTRICTED DUE TO NO RESPONSE 🚫 HOSTING RESTRICTED DUE TO NO RESPONSE 🚫 HOSTING RESTRICTED DUE TO NO RESPONSE 🚫
</div>
</div>
</body>
</html>
