<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - Vasudeva Pet Hospital</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
<style>
  :root {
    --green: #1a4d2e;
    --green-light: #2d6a4f;
    --gold: #c9a84c;
    --cream: #faf7f0;
    --text-dark: #1a1a1a;
    --text-mid: #444;
    --border: #e8e0d0;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans', sans-serif; background:var(--cream); color:var(--text-dark); }
  .login-container { display:flex; align-items:center; justify-content:center; height:100vh; }
  .login-box { background:white; padding:40px; border-radius:20px; box-shadow:0 10px 40px rgba(0,0,0,0.1); text-align:center; width:100%; max-width:400px; }
  .login-box h2 { font-family:'Playfair Display', serif; color:var(--green); margin-bottom:10px; }
  .login-box p { color:var(--text-mid); margin-bottom:20px; font-size:14px; }
  .login-box input { width:100%; padding:12px; border:1px solid var(--border); border-radius:8px; margin-bottom:20px; font-size:15px; outline:none; }
  .login-box input:focus { border-color:var(--green); }
  .btn { background:var(--green); color:white; border:none; padding:12px 20px; border-radius:8px; cursor:pointer; width:100%; font-weight:600; font-size:15px; }
  .btn:hover { background:var(--green-light); }
  
  /* Dashboard layout */
  .dashboard { display:flex; height:100vh; overflow:hidden; }
  .sidebar { width:250px; background:var(--green); color:white; display:flex; flex-direction:column; }
  .sidebar-header { padding:20px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.1); }
  .sidebar-header h2 { font-family:'Playfair Display', serif; font-size:20px; }
  .nav-item { padding:15px 20px; cursor:pointer; transition:background 0.2s; display:flex; align-items:center; gap:10px; }
  .nav-item:hover, .nav-item.active { background:rgba(255,255,255,0.1); border-left:4px solid var(--gold); }
  .main-content { flex:1; overflow-y:auto; padding:40px; background:#f9f9f9; }
  
  .card { background:white; padding:20px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.05); margin-bottom:20px; }
  .form-group { margin-bottom:15px; }
  .form-group label { display:block; font-size:13px; font-weight:600; margin-bottom:5px; color:var(--text-mid); }
  .form-group input, .form-group textarea { width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; outline:none; font-family:'DM Sans'; }
  .grid-list { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:20px; }
  .item-card { border:1px solid #eee; border-radius:8px; overflow:hidden; background:white; position:relative; }
  .item-card img { width:100%; height:150px; object-fit:cover; }
  .item-card-body { padding:10px; }
  .item-card h4 { font-size:14px; margin-bottom:5px; }
  .item-card p { font-size:12px; color:var(--text-light); }
  .btn-danger { background:#e74c3c; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; font-size:12px; position:absolute; top:10px; right:10px; }
  
  /* Mobile Responsive */
  @media (max-width: 768px) {
    .dashboard { flex-direction: column; }
    .sidebar { width: 100%; flex-direction: row; overflow-x: auto; overflow-y: hidden; flex-shrink: 0; }
    .sidebar-header { display: none; }
    .nav-category { display: none !important; }
    .nav-item { padding: 15px; white-space: nowrap; border-left: none; border-bottom: 4px solid transparent; flex-shrink: 0; }
    .nav-item:hover, .nav-item.active { border-left: none; border-bottom: 4px solid var(--gold); }
    .main-content { padding: 15px; }
    .grid-list { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect } = React;

  // Initialize Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCLtsLnhlQQoailjnhSGaL8e_H11DeFg6U",
    authDomain: "vasudeva-ed58c.firebaseapp.com",
    projectId: "vasudeva-ed58c",
    storageBucket: "vasudeva-ed58c.firebasestorage.app",
    messagingSenderId: "97525261291",
    appId: "1:97525261291:web:a0a2ce1812159183a72fae"
  };
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  const db = firebase.firestore();

  function App() {
    const [isAuthenticated, setIsAuthenticated] = useState(false);
    const [password, setPassword] = useState('');
    const [activeTab, setActiveTab] = useState('dashboard');
    const [showLottie, setShowLottie] = useState(true);
    const [loginError, setLoginError] = useState('');

    useEffect(() => {
      const timer = setTimeout(() => setShowLottie(false), 3000);
      return () => clearTimeout(timer);
    }, []);

    const handleLogin = (e) => {
      e.preventDefault();
      db.collection('content').doc('adminSettings').get().then(doc => {
        const correctPassword = doc.exists && doc.data().password ? doc.data().password : 'vasudeva@123';
        if (password === correctPassword) {
          setIsAuthenticated(true);
        } else {
          setLoginError('Incorrect password');
        }
      });
    };

    if (showLottie) {
      return (
        <div style={{ position: 'fixed', inset: 0, background: 'var(--cream)', zIndex: 9999, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <dotlottie-player
            src="https://lottie.host/b9572a18-51a4-4e8b-af15-20b9b4d05590/pY9ka2Yknn.lottie"
            background="transparent"
            speed="1"
            style={{ width: '300px', height: '300px' }}
            loop
            autoplay
          ></dotlottie-player>
        </div>
      );
    }

    if (!isAuthenticated) {
      return (
        <div className="login-container">
          <div className="login-box">
            <h2>Admin Portal</h2>
            <p>Enter password to access Vasudeva Control</p>
            <form onSubmit={handleLogin}>
              <input type="password" placeholder="Enter Password" value={password} onChange={e=>setPassword(e.target.value)} />
              {loginError && <p style={{color:'red', marginTop:'-10px', marginBottom:'10px'}}>{loginError}</p>}
              <button type="submit" className="btn">Login to Admin</button>
            </form>
          </div>
        </div>
      );
    }

    return (
      <div className="dashboard">
        <div className="sidebar">
          <div className="sidebar-header">
            <img src="logo.png" alt="Vasudeva Admin" style={{width:'100%', maxWidth:'180px', objectFit:'contain'}} />
          </div>
          <div className="nav-category" style={{padding:'15px', fontSize:'12px', color:'rgba(255,255,255,0.5)', textTransform:'uppercase', letterSpacing:'1px', fontWeight:'600'}}>Overview</div>
          <div className={`nav-item ${activeTab === 'dashboard' ? 'active' : ''}`} onClick={() => setActiveTab('dashboard')}>
            <i className="fa fa-chart-pie"></i> Dashboard
          </div>

          <div className="nav-category" style={{padding:'15px', fontSize:'12px', color:'rgba(255,255,255,0.5)', textTransform:'uppercase', letterSpacing:'1px', fontWeight:'600', marginTop:'10px'}}>Global</div>
          <div className={`nav-item ${activeTab === 'settings' ? 'active' : ''}`} onClick={() => setActiveTab('settings')}>
            <i className="fa fa-cog"></i> General Settings
          </div>
          <div className={`nav-item ${activeTab === 'security' ? 'active' : ''}`} onClick={() => setActiveTab('security')}>
            <i className="fa fa-lock"></i> Password & Security
          </div>
          
          <div className="nav-category" style={{padding:'15px', fontSize:'12px', color:'rgba(255,255,255,0.5)', textTransform:'uppercase', letterSpacing:'1px', fontWeight:'600', marginTop:'10px'}}>Pages</div>
          <div className={`nav-item ${activeTab === 'home' ? 'active' : ''}`} onClick={() => setActiveTab('home')}>
            <i className="fa fa-home"></i> Home Page
          </div>
          <div className={`nav-item ${activeTab === 'about' ? 'active' : ''}`} onClick={() => setActiveTab('about')}>
            <i className="fa fa-info-circle"></i> About Page
          </div>
          
          <div className="nav-category" style={{padding:'15px', fontSize:'12px', color:'rgba(255,255,255,0.5)', textTransform:'uppercase', letterSpacing:'1px', fontWeight:'600', marginTop:'10px'}}>Collections</div>
          <div className={`nav-item ${activeTab === 'services' ? 'active' : ''}`} onClick={() => setActiveTab('services')}>
            <i className="fa fa-stethoscope"></i> Services List
          </div>
          <div className={`nav-item ${activeTab === 'gallery' ? 'active' : ''}`} onClick={() => setActiveTab('gallery')}>
            <i className="fa fa-images"></i> Photo Gallery
          </div>
          <div className={`nav-item ${activeTab === 'store' ? 'active' : ''}`} onClick={() => setActiveTab('store')}>
            <i className="fa fa-shopping-cart"></i> Pet Store
          </div>
          
          <div style={{flex:1}}></div>
          <div className="nav-item" onClick={() => window.open('index.html', '_blank')}>
            <i className="fa fa-external-link-alt"></i> View Website
          </div>
          <div className="nav-item" onClick={() => window.location.reload()}>
            <i className="fa fa-sign-out-alt"></i> Lock Panel
          </div>
        </div>
        <div className="main-content">
          {activeTab === 'dashboard' && <DashboardManager />}
          {activeTab === 'settings' && <SettingsManager />}
          {activeTab === 'security' && <SecurityManager />}
          {activeTab === 'home' && <HomeManager />}
          {activeTab === 'about' && <AboutManager />}
          {activeTab === 'services' && <ServicesManager />}
          {activeTab === 'gallery' && <GalleryManager />}
          {activeTab === 'store' && <StoreManager />}
        </div>
      </div>
    );
  }

  // Generic hook for simple document forms
  function useDocForm(collection, docId, initialState) {
    const [data, setData] = useState(initialState);
    const [saving, setSaving] = useState(false);

    useEffect(() => {
      db.collection(collection).doc(docId).get().then(doc => {
        if (doc.exists) setData(doc.data());
      });
    }, [collection, docId]);

    const handleSave = (e) => {
      e.preventDefault();
      setSaving(true);
      db.collection(collection).doc(docId).set(data, { merge: true }).then(() => {
        setSaving(false);
        alert('Saved successfully!');
      });
    };
    return [data, setData, handleSave, saving];
  }

  function SettingsManager() {
    const [data, setData, handleSave, saving] = useDocForm('content', 'settings', {
      contactAddress: '', contactPhone: '', contactEmail: '', contactHours: '', mapUrl: ''
    });

    return (
      <div>
        <h2 style={{marginBottom:'20px'}}>General Settings</h2>
        <div className="card">
          <form onSubmit={handleSave}>
            <h4>Contact Info</h4>
            <div className="form-group"><label>Address</label><input type="text" value={data.contactAddress} onChange={e=>setData({...data, contactAddress:e.target.value})} /></div>
            <div className="form-group"><label>Phone</label><input type="text" value={data.contactPhone} onChange={e=>setData({...data, contactPhone:e.target.value})} /></div>
            <div className="form-group"><label>Email</label><input type="text" value={data.contactEmail} onChange={e=>setData({...data, contactEmail:e.target.value})} /></div>
            <div className="form-group"><label>Operating Hours (use \n for line breaks)</label><textarea value={data.contactHours} onChange={e=>setData({...data, contactHours:e.target.value})} /></div>
            <div className="form-group"><label>Google Map Embed URL</label><input type="text" placeholder="e.g. https://www.google.com/maps/embed?pb=..." value={data.mapUrl||''} onChange={e=>setData({...data, mapUrl:e.target.value})} /></div>
            <button type="submit" className="btn">{saving ? 'Saving...' : 'Save Settings'}</button>
          </form>
        </div>
      </div>
    );
  }



  function SecurityManager() {
    const [data, setData, handleSave, saving] = useDocForm('content', 'adminSettings', { password: '' });

    return (
      <div>
        <h2 style={{marginBottom:'20px'}}>Password & Security</h2>
        <div className="card" style={{maxWidth:'500px'}}>
          <form onSubmit={handleSave}>
            <div className="form-group">
              <label>Admin Panel Password</label>
              <input 
                type="text" 
                required 
                value={data.password||''} 
                onChange={e=>setData({...data, password:e.target.value})} 
                style={{fontFamily:'monospace', fontSize:'16px', letterSpacing:'1px'}}
              />
              <p style={{fontSize:'12px', color:'var(--text-light)', marginTop:'5px'}}>Anyone with this password can access the admin panel and edit the website.</p>
            </div>
            <button type="submit" className="btn">{saving ? 'Saving...' : 'Update Password'}</button>
          </form>
        </div>
      </div>
    );
  }

  function DashboardManager() {
    const [stats, setStats] = useState({ products: 0, appointments: 0, visits: 0 });
    const [visitFilter, setVisitFilter] = useState('all');
    const [appts, setAppts] = useState([]);
    const [selectedAppt, setSelectedAppt] = useState(null);
    const [showApptsModal, setShowApptsModal] = useState(false);

    useEffect(() => {
      db.collection('store').get().then(snap => setStats(s => ({...s, products: snap.size})));
      db.collection('appointments').orderBy('createdAt', 'desc').get().then(snap => {
        setAppts(snap.docs.map(d => ({id: d.id, ...d.data()})));
        setStats(s => ({...s, appointments: snap.size}));
      });
    }, []);

    useEffect(() => {
      let query = db.collection('visits');
      if (visitFilter !== 'all') {
        const now = new Date();
        let past = new Date();
        if (visitFilter === 'today') past.setHours(0,0,0,0);
        else if (visitFilter === '1day') past.setDate(now.getDate() - 1);
        else if (visitFilter === '3days') past.setDate(now.getDate() - 3);
        else if (visitFilter === '7days') past.setDate(now.getDate() - 7);
        else if (visitFilter === '1month') past.setMonth(now.getMonth() - 1);
        else if (visitFilter === '6months') past.setMonth(now.getMonth() - 6);
        else if (visitFilter === '1year') past.setFullYear(now.getFullYear() - 1);
        
        query = query.where('timestamp', '>=', past);
      }
      query.get().then(snap => setStats(s => ({...s, visits: snap.size})));
    }, [visitFilter]);

    return (
      <div>
        <h2 style={{marginBottom:'20px'}}>Dashboard Overview</h2>
        
        <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:'20px', marginBottom:'30px'}}>
          <div className="card" style={{textAlign:'center', padding:'30px'}}>
            <i className="fa fa-chart-line" style={{fontSize:'40px', color:'var(--gold)', marginBottom:'15px'}}></i>
            <h3>Website Visits</h3>
            <div style={{fontSize:'32px', fontWeight:'700', color:'var(--green)', margin:'10px 0'}}>{stats.visits}</div>
            <select value={visitFilter} onChange={e=>setVisitFilter(e.target.value)} style={{padding:'5px', borderRadius:'5px', border:'1px solid var(--border)'}}>
              <option value="all">All Time</option>
              <option value="today">Today</option>
              <option value="1day">Last 24 Hours</option>
              <option value="3days">Last 3 Days</option>
              <option value="7days">Last 7 Days</option>
              <option value="1month">Last Month</option>
              <option value="6months">Last 6 Months</option>
              <option value="1year">Last 1 Year</option>
            </select>
          </div>
          
          <div className="card" style={{textAlign:'center', padding:'30px', cursor:'pointer'}} onClick={() => setShowApptsModal(true)}>
            <i className="fa fa-calendar-check" style={{fontSize:'40px', color:'var(--gold)', marginBottom:'15px'}}></i>
            <h3>Appointments</h3>
            <div style={{fontSize:'32px', fontWeight:'700', color:'var(--green)', margin:'10px 0'}}>{stats.appointments}</div>
            <p style={{color:'var(--gold)', fontSize:'13px', fontWeight:'600'}}>Click to view all</p>
          </div>

          <div className="card" style={{textAlign:'center', padding:'30px', cursor:'pointer'}} onClick={() => setActiveTab('store')}>
            <i className="fa fa-shopping-bag" style={{fontSize:'40px', color:'var(--gold)', marginBottom:'15px'}}></i>
            <h3>Store Products</h3>
            <div style={{fontSize:'32px', fontWeight:'700', color:'var(--green)', margin:'10px 0'}}>{stats.products}</div>
            <p style={{color:'var(--gold)', fontSize:'13px', fontWeight:'600'}}>Manage Store</p>
          </div>
        </div>

        {/* Appointments List Modal */}
        {showApptsModal && (
          <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.6)', zIndex:100, display:'flex', alignItems:'center', justifyContent:'center'}}>
            <div className="card" style={{width:'90%', maxWidth:'800px', maxHeight:'80vh', overflowY:'auto'}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px'}}>
                <h3 style={{margin:0, color:'var(--green)'}}><i className="fa fa-calendar-check"></i> Received Appointments</h3>
                <button onClick={() => setShowApptsModal(false)} style={{background:'var(--cream)', color:'var(--text-dark)', border:'none', width:'36px', height:'36px', borderRadius:'50%', fontSize:'20px', cursor:'pointer'}}>&times;</button>
              </div>
              <table style={{width:'100%', borderCollapse:'collapse', fontSize:'14px'}}>
                <thead>
                  <tr style={{background:'var(--cream)', textAlign:'left'}}>
                    <th style={{padding:'12px', borderBottom:'2px solid var(--border)'}}>Req. Date</th>
                    <th style={{padding:'12px', borderBottom:'2px solid var(--border)'}}>Name</th>
                    <th style={{padding:'12px', borderBottom:'2px solid var(--border)'}}>Pet</th>
                    <th style={{padding:'12px', borderBottom:'2px solid var(--border)'}}>Service</th>
                    <th style={{padding:'12px', borderBottom:'2px solid var(--border)'}}>Action</th>
                  </tr>
                </thead>
                <tbody>
                  {appts.map(a => (
                    <tr key={a.id} style={{borderBottom:'1px solid #eee'}}>
                      <td style={{padding:'12px'}}>{a.date}</td>
                      <td style={{padding:'12px', fontWeight:'600'}}>{a.name}</td>
                      <td style={{padding:'12px'}}>{a.petName || '-'}</td>
                      <td style={{padding:'12px'}}>{a.service}</td>
                      <td style={{padding:'12px'}}>
                        <button className="btn" style={{padding:'6px 12px', fontSize:'12px'}} onClick={() => setSelectedAppt(a)}>View</button>
                      </td>
                    </tr>
                  ))}
                  {appts.length === 0 && <tr><td colSpan="5" style={{padding:'30px', textAlign:'center', color:'var(--text-light)'}}>No appointments received yet.</td></tr>}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* Appointment Detail Modal */}
        {selectedAppt && (
          <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.6)', zIndex:200, display:'flex', alignItems:'center', justifyContent:'center'}}>
            <div className="card" style={{width:'90%', maxWidth:'500px'}}>
              <h3 style={{marginTop:0, color:'var(--green)', borderBottom:'1px solid #eee', paddingBottom:'15px', marginBottom:'20px'}}><i className="fa fa-info-circle"></i> Appointment Details</h3>
              <div style={{display:'grid', gap:'12px', fontSize:'15px', lineHeight:'1.6'}}>
                <div><span style={{color:'var(--text-light)', display:'inline-block', width:'120px'}}>Client Name:</span> <strong>{selectedAppt.name}</strong></div>
                <div><span style={{color:'var(--text-light)', display:'inline-block', width:'120px'}}>Phone:</span> <a href={`tel:${selectedAppt.phone}`} style={{color:'var(--green)', fontWeight:'600'}}>{selectedAppt.phone}</a></div>
                <div><span style={{color:'var(--text-light)', display:'inline-block', width:'120px'}}>Pet Name:</span> <strong>{selectedAppt.petName || 'Not specified'}</strong></div>
                <div><span style={{color:'var(--text-light)', display:'inline-block', width:'120px'}}>Service Needed:</span> <strong>{selectedAppt.service || 'Not specified'}</strong></div>
                <div><span style={{color:'var(--text-light)', display:'inline-block', width:'120px'}}>Preferred Date:</span> <strong style={{color:'var(--gold)'}}>{selectedAppt.date}</strong></div>
                <div><span style={{color:'var(--text-light)', display:'inline-block', width:'120px'}}>Submitted On:</span> {selectedAppt.createdAt ? new Date(selectedAppt.createdAt.toDate()).toLocaleString() : 'Just now'}</div>
                
                <div style={{marginTop:'10px'}}>
                  <span style={{color:'var(--text-light)', display:'block', marginBottom:'5px'}}>Additional Message:</span>
                  <div style={{background:'#f9f9f9', padding:'15px', borderRadius:'8px', minHeight:'60px', border:'1px solid #eee', color:'var(--text-dark)'}}>
                    {selectedAppt.message || 'No additional message provided.'}
                  </div>
                </div>
              </div>
              
              <div style={{marginTop:'25px', display:'flex', gap:'10px'}}>
                <a href={`tel:${selectedAppt.phone}`} className="btn-primary" style={{flex:1, textAlign:'center', textDecoration:'none'}}><i className="fa fa-phone"></i> Call Client</a>
                <button className="btn" style={{flex:1, background:'#eee', color:'var(--text-dark)'}} onClick={() => setSelectedAppt(null)}>Close</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  function HomeManager() {
    const [data, setData, handleSave, saving] = useDocForm('content', 'home', {
      heroBadge: '', heroTitle1: '', heroTitle2: '', heroTagline: '', heroDesc: ''
    });

    return (
      <div>
        <h2 style={{marginBottom:'20px'}}>Home Page Manager</h2>
        <div className="card">
          <form onSubmit={handleSave}>
            <h4>Hero Section Text</h4>
            <div className="form-group"><label>Top Badge</label><input type="text" value={data.heroBadge} onChange={e=>setData({...data, heroBadge:e.target.value})} /></div>
            <div className="form-group"><label>Main Title (Part 1 - Green)</label><input type="text" value={data.heroTitle1} onChange={e=>setData({...data, heroTitle1:e.target.value})} /></div>
            <div className="form-group"><label>Main Title (Part 2 - Gold)</label><input type="text" value={data.heroTitle2} onChange={e=>setData({...data, heroTitle2:e.target.value})} /></div>
            <div className="form-group"><label>Tagline (VALUE VISION VETERINARY)</label><input type="text" value={data.heroTagline} onChange={e=>setData({...data, heroTagline:e.target.value})} /></div>
            <div className="form-group"><label>Description Text</label><textarea value={data.heroDesc} onChange={e=>setData({...data, heroDesc:e.target.value})} /></div>
            <button type="submit" className="btn">{saving ? 'Saving...' : 'Save Home Content'}</button>
          </form>
        </div>
      </div>
    );
  }

  function AboutManager() {
    const [data, setData, handleSave, saving] = useDocForm('content', 'about', {
      storyText: '', missionText: '', visionText: ''
    });

    return (
      <div>
        <h2 style={{marginBottom:'20px'}}>About Page Manager</h2>
        <div className="card">
          <form onSubmit={handleSave}>
            <div className="form-group"><label>Our Story Text</label><textarea rows="5" value={data.storyText} onChange={e=>setData({...data, storyText:e.target.value})} /></div>
            <div className="form-group"><label>Our Mission</label><textarea rows="3" value={data.missionText} onChange={e=>setData({...data, missionText:e.target.value})} /></div>
            <div className="form-group"><label>Our Vision</label><textarea rows="3" value={data.visionText} onChange={e=>setData({...data, visionText:e.target.value})} /></div>
            <button type="submit" className="btn">{saving ? 'Saving...' : 'Save About Content'}</button>
          </form>
        </div>
      </div>
    );
  }

  function ServicesManager() {
    const [services, setServices] = useState([]);
    const [form, setForm] = useState({ title: '', desc: '', icon: 'fa-stethoscope', img: '', feats: '' });

    const fetchServices = () => {
      db.collection('services').get().then(snap => {
        setServices(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
      });
    };
    useEffect(() => { fetchServices(); }, []);

    const handleAdd = (e) => {
      e.preventDefault();
      const featsArray = form.feats.split(',').map(s=>s.trim()).filter(s=>s);
      db.collection('services').add({...form, feats: featsArray}).then(() => {
        setForm({ title: '', desc: '', icon: 'fa-stethoscope', img: '', feats: '' });
        fetchServices();
      });
    };
    const handleDelete = (id) => {
      if (confirm('Delete this service?')) db.collection('services').doc(id).delete().then(fetchServices);
    };

    return (
      <div>
        <h2 style={{marginBottom:'20px'}}>Services Manager</h2>
        <div className="card">
          <h4>Add New Service</h4>
          <form onSubmit={handleAdd} style={{marginTop:'15px'}}>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'15px'}}>
              <div className="form-group"><label>Service Title</label><input required value={form.title} onChange={e=>setForm({...form, title:e.target.value})} /></div>
              <div className="form-group"><label>Icon Class (e.g. fa-stethoscope)</label><input required value={form.icon} onChange={e=>setForm({...form, icon:e.target.value})} /></div>
              <div className="form-group"><label>Image URL</label><input required value={form.img} onChange={e=>setForm({...form, img:e.target.value})} /></div>
              <div className="form-group"><label>Features (comma separated)</label><input value={form.feats} onChange={e=>setForm({...form, feats:e.target.value})} placeholder="X-Ray, Blood Test, Checkup" /></div>
            </div>
            <div className="form-group"><label>Description</label><textarea required value={form.desc} onChange={e=>setForm({...form, desc:e.target.value})} /></div>
            <button type="submit" className="btn">Add Service</button>
          </form>
        </div>
        <div className="grid-list">
          {services.map(s => (
            <div className="item-card" key={s.id}>
              <img src={s.img} alt={s.title} />
              <button className="btn-danger" onClick={() => handleDelete(s.id)}><i className="fa fa-trash"></i></button>
              <div className="item-card-body"><h4>{s.title}</h4><p>{s.desc.substring(0,60)}...</p></div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  function GalleryManager() {
    const [images, setImages] = useState([]);
    const [form, setForm] = useState({ src: '', cat: 'Our Clinic', label: '' });

    const fetchImages = () => {
      db.collection('gallery').get().then(snap => {
        setImages(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
      });
    };

    useEffect(() => { fetchImages(); }, []);

    const handleAdd = (e) => {
      e.preventDefault();
      if (!form.src) return alert('Image URL is required');
      db.collection('gallery').add(form).then(() => {
        setForm({ src: '', cat: 'Our Clinic', label: '' });
        fetchImages();
      });
    };

    const handleDelete = (id) => {
      if (confirm('Are you sure you want to delete this image?')) {
        db.collection('gallery').doc(id).delete().then(fetchImages);
      }
    };

    return (
      <div>
        <h2 style={{marginBottom:'20px'}}>Gallery Manager</h2>
        <div className="card">
          <h4>Add New Image</h4>
          <form onSubmit={handleAdd} style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr auto', gap:'10px', alignItems:'end', marginTop:'15px'}}>
            <div className="form-group" style={{marginBottom:0}}>
              <label>Image Link (URL)</label>
              <input type="text" value={form.src} onChange={e => setForm({...form, src: e.target.value})} placeholder="https://..." />
            </div>
            <div className="form-group" style={{marginBottom:0}}>
              <label>Category</label>
              <select value={form.cat} onChange={e => setForm({...form, cat: e.target.value})} style={{width:'100%', padding:'10px', border:'1px solid #ddd', borderRadius:'6px'}}>
                <option>Our Clinic</option>
                <option>Happy Patients</option>
                <option>Treatments</option>
                <option>Pet Grooming</option>
                <option>Events & Camps</option>
                <option>Pet Store</option>
              </select>
            </div>
            <div className="form-group" style={{marginBottom:0}}>
              <label>Label</label>
              <input type="text" value={form.label} onChange={e => setForm({...form, label: e.target.value})} placeholder="e.g. Cute Puppy" />
            </div>
            <button type="submit" className="btn" style={{marginBottom:'2px'}}>Add Image</button>
          </form>
        </div>

        <div className="grid-list">
          {images.map(img => (
            <div className="item-card" key={img.id}>
              <img src={img.src} alt={img.label} />
              <button className="btn-danger" onClick={() => handleDelete(img.id)}><i className="fa fa-trash"></i></button>
              <div className="item-card-body">
                <h4>{img.label}</h4>
                <p>{img.cat}</p>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  function StoreManager() {
    const [products, setProducts] = useState([]);
    const [form, setForm] = useState({ img: '', brand: '', name: '', price: '', original: '', stars: 5, reviews: 0 });

    const fetchProducts = () => {
      db.collection('products').get().then(snap => {
        setProducts(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
      });
    };

    useEffect(() => { fetchProducts(); }, []);

    const handleAdd = (e) => {
      e.preventDefault();
      if (!form.img || !form.name) return alert('Image URL and Name are required');
      db.collection('products').add({
        ...form,
        stars: Number(form.stars),
        reviews: Number(form.reviews)
      }).then(() => {
        setForm({ img: '', brand: '', name: '', price: '', original: '', stars: 5, reviews: 0 });
        fetchProducts();
      });
    };

    const handleDelete = (id) => {
      if (confirm('Are you sure you want to delete this product?')) {
        db.collection('products').doc(id).delete().then(fetchProducts);
      }
    };

    return (
      <div>
        <h2 style={{marginBottom:'20px'}}>Pet Store Manager</h2>
        <div className="card">
          <h4>Add New Product</h4>
          <form onSubmit={handleAdd} style={{marginTop:'15px'}}>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'15px'}}>
              <div className="form-group">
                <label>Image Link (URL)</label>
                <input type="text" value={form.img} onChange={e => setForm({...form, img: e.target.value})} placeholder="https://..." />
              </div>
              <div className="form-group">
                <label>Product Name</label>
                <input type="text" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
              </div>
              <div className="form-group">
                <label>Brand</label>
                <input type="text" value={form.brand} onChange={e => setForm({...form, brand: e.target.value})} />
              </div>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px'}}>
                <div className="form-group">
                  <label>Price (e.g. ₹450)</label>
                  <input type="text" value={form.price} onChange={e => setForm({...form, price: e.target.value})} />
                </div>
                <div className="form-group">
                  <label>Cut Price (Original)</label>
                  <input type="text" value={form.original} onChange={e => setForm({...form, original: e.target.value})} />
                </div>
              </div>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px'}}>
                <div className="form-group">
                  <label>Stars (1-5)</label>
                  <input type="number" min="1" max="5" value={form.stars} onChange={e => setForm({...form, stars: e.target.value})} />
                </div>
                <div className="form-group">
                  <label>Review Count</label>
                  <input type="number" min="0" value={form.reviews} onChange={e => setForm({...form, reviews: e.target.value})} />
                </div>
              </div>
            </div>
            <button type="submit" className="btn" style={{marginTop:'10px'}}>Add Product</button>
          </form>
        </div>

        <div className="grid-list">
          {products.map(p => (
            <div className="item-card" key={p.id}>
              <img src={p.img} alt={p.name} style={{objectFit:'contain', padding:'10px'}} />
              <button className="btn-danger" onClick={() => handleDelete(p.id)}><i className="fa fa-trash"></i></button>
              <div className="item-card-body">
                <h4>{p.name}</h4>
                <p>{p.brand} • {p.price} <strike style={{fontSize:'10px'}}>{p.original}</strike></p>
                <p style={{marginTop:'5px', color:'var(--gold)'}}>{"★".repeat(p.stars)} ({p.reviews})</p>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
